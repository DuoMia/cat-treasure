<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猫咪神藏 - 密室逃脱</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script>
        (function() {
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isMobile = isIOS || /Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua) ||
                            (/Mobi/i.test(ua) && navigator.maxTouchPoints > 0);
            const isWeChat = /MicroMessenger/i.test(ua);

            if (isIOS) document.documentElement.classList.add('ios-device');
            if (isMobile) document.documentElement.classList.add('mobile-device');
            if (isWeChat) document.documentElement.classList.add('wechat-browser');
        })();
    </script>
</head>
<body>
    <!-- 调试按钮（在 game-container 外，避免继承 touch-action:none） -->
    <button id="debug-toggle" onclick="toggleDebugMode()">🔧 调试模式</button>
    <!-- 开始画面（在 game-container 外，避免继承 touch-action:none） -->
    <div id="title-screen">
        <h1 class="title-text">🐱 猫咪神藏</h1>
        <p class="subtitle">你被困在梦境世界，唯一的线索是"猫咪神藏"...</p>
        <button class="start-btn" onclick="startGame()">开始游戏</button>
        <button id="restart-btn" class="restart-btn hidden" onclick="restartGame()">重新开始</button>
    </div>
    <div id="game-container">

        <!-- 游戏画面 -->
        <div id="game-play" class="hidden">
            <div id="room-scene">
                <img id="room-image" src="room.jpg" alt="房间" onerror="this.style.display='none'; document.getElementById('fallback-scene').style.display='flex';">
                <img id="pen-holder-image" src="pen_holder.png" alt="笔筒" class="hidden">
                <div id="pen-holder-hotspot" class="hidden"></div>
                <img id="pen-image" src="pen.png" alt="钢笔" class="hidden">
                <div id="fallback-scene" class="hidden">
                    <div class="fallback-content">
                        <div class="instruction">请将图片文件命名为 room.jpg 放置在项目目录中</div>
                        <div class="room-layout">
                            <div class="room-object door" onclick="interactDoor()">门</div>
                            <div class="room-object window" onclick="interactWindow()">窗户</div>
                            <div class="room-object clock" onclick="interactClock()">时钟</div>
                            <div class="room-object sofa" onclick="interactSofa()">沙发</div>
                            <div class="room-object table" onclick="interactTable()">桌子</div>
                            <div class="room-object drawer" onclick="interactDrawer()">抽屉</div>
                        </div>
                    </div>
                </div>
                <img id="cat-image" src="cat.jpg" alt="朵朵" class="hidden">
                <div id="hotspots"></div>
            </div>

            <!-- 沙发角落场景（全屏覆盖，在 room-scene 外） -->
            <div id="sofa-corner-scene" class="hidden scene-container">
                <img id="sofa-corner-image" src="sofa_corner.jpg" alt="沙发角落" class="scene-image">
                <img id="sofa-corner-cat" src="cat.jpg" alt="朵朵">
                <div id="sofa-corner-bump"></div>
                <div id="sofa-corner-scratch" class="hidden"></div>
                <button id="sofa-corner-back" class="scene-back-btn" onclick="closeSofaCornerScene()">← 返回</button>
            </div>

            <!-- 抽屉特写场景 -->
            <div id="drawer-scene" class="hidden scene-container">
                <img id="drawer-image" src="drawer.jpg" alt="抽屉内部" class="scene-image">
                <div id="drawer-diary-hotspot"></div>
                <button id="drawer-scene-back" class="scene-back-btn" onclick="closeDrawerScene()">← 返回</button>
            </div>

            <!-- 窗户特写场景 -->
            <div id="window-scene" class="hidden scene-container">
                <img id="window-close-image" src="window_close.jpg" alt="窗户特写" class="scene-image">
                <button id="window-scene-back" class="scene-back-btn" onclick="closeWindowScene()">← 返回</button>
            </div>

            <!-- 时钟特写场景 -->
            <div id="clock-scene" class="hidden scene-container" style="background:#1a1008;display:flex;align-items:center;justify-content:center;">
                <div id="clock-face-wrapper">
                    <svg id="clock-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- 表盘 -->
                        <circle cx="100" cy="100" r="95" fill="#f5efe0" stroke="#8b6f47" stroke-width="6"/>
                        <!-- 刻度 -->
                        <g id="clock-ticks"></g>
                        <!-- 数字 -->
                        <g id="clock-numbers"></g>
                        <!-- 分针（固定在12点） -->
                        <line id="clock-minute-hand" x1="100" y1="100" x2="100" y2="22" stroke="#555" stroke-width="3" stroke-linecap="round"/>
                        <!-- 时针 -->
                        <line id="clock-hour-hand" x1="100" y1="100" x2="100" y2="38" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                        <!-- 中心点 -->
                        <circle cx="100" cy="100" r="5" fill="#8b6f47"/>
                        <!-- 可点击的刻度热区 -->
                        <g id="clock-hotspots"></g>
                    </svg>
                    <div id="clock-time-label">-- : --</div>
                </div>
                <button id="clock-scene-back" class="scene-back-btn" onclick="closeClockScene()">← 返回</button>
            </div>

            <!-- 照片墙特写场景 -->
            <div id="photo-wall-scene" class="hidden scene-container">
                <img id="photo-wall-image" src="photo_wall.jpg" alt="照片墙" class="scene-image">
                <div id="photo-wall-photo1" class="photo-hotspot"></div>
                <div id="photo-wall-photo2" class="photo-hotspot"></div>
                <div id="photo-wall-photo3" class="photo-hotspot"></div>
                <button id="photo-wall-back" class="scene-back-btn" onclick="closePhotoWallScene()">← 返回</button>
            </div>

            <!-- 书架场景 -->
            <div id="bookshelf-scene" class="hidden scene-container" style="background:#2c1a0e;">
                <img id="bookshelf-image" src="bookshelf.jpg" alt="书架" class="scene-image">
                <!-- 书本谜题 UI -->
                <div id="bookshelf-puzzle-ui">
                    <div class="book-puzzle-label">📚 书架谜题</div>
                    <div class="book-puzzle-hint" id="book-puzzle-hint">按厚度从大到小依次抽出书本：0/5</div>
                </div>
                <button id="bookshelf-back" class="scene-back-btn" onclick="closeBookshelfScene()">← 返回</button>
            </div>

            <!-- 阳台场景 -->
            <div id="balcony-scene" class="hidden scene-container" style="background:#87ceeb;">
                <img id="balcony-image" src="balcony.jpg" alt="阳台" class="scene-image">
                <button id="balcony-back" class="scene-back-btn" onclick="closeBalconyScene()">← 返回</button>
            </div>

            <!-- 食盆场景 -->
            <div id="food-bowl-scene" class="hidden scene-container" style="background:#2c1a0e;">
                <img id="food-bowl-image" src="food_bowl.jpg" alt="食盆" class="scene-image">
                <button id="food-bowl-back" class="scene-back-btn" onclick="closeFoodBowlScene()">← 返回</button>
            </div>

            <!-- 画框谜题场景 -->
            <div id="painting-scene" class="hidden scene-container" style="background:#1a1a2e;">
                <img id="painting-image" src="painting.jpg" alt="画框" class="scene-image">
                <button id="painting-back" class="scene-back-btn" onclick="closePaintingScene()">← 返回</button>
            </div>

            <!-- 玩具箱场景 -->
            <div id="toy-box-scene" class="hidden scene-container" style="background:#1a1208;">
                <img id="toy-box-image" src="toy_box.jpg" alt="玩具箱" class="scene-image">
                <div class="toy-box-label">🔒 图案锁</div>
                <div class="toy-box-hint">按照正确顺序点击图案</div>
                <button id="toy-box-back" class="scene-back-btn" onclick="closeToyBoxScene()">← 返回</button>
            </div>

            <!-- 记忆相册（彩蛋） -->
            <div id="album-scene" class="hidden scene-container" style="background:linear-gradient(160deg,#1a0f06 0%,#2c1a0e 100%);overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:60px 20px 40px;box-sizing:border-box;">
                <div id="album-content"></div>
                <button id="album-back" class="scene-back-btn" onclick="closeAlbumScene()">← 返回</button>
            </div>
            </div>
        </div>

        <!-- 对话框（全局，所有场景共用） -->
        <div id="dialog-box" class="game-panel hidden">
            <div id="dialog-text"></div>
            <div id="dialog-continue" class="hidden">点击继续</div>
        </div>

        <!-- 选项框（全局，所有场景共用） -->
        <div id="choice-box" class="game-panel hidden">
            <div id="choice-buttons"></div>
        </div>

        <!-- 物品栏（全局，所有场景可见） -->
        <button id="inventory-toggle" class="hidden">🎒</button>
        <button id="help-toggle" class="hidden" onclick="showHelp()">💡</button>
        <div id="inventory-panel" class="hidden">
            <div class="inventory-header">物品栏</div>
            <div id="inventory-items"></div>
        </div>

        <!-- 密码输入框 -->
        <div id="password-modal" class="hidden">
            <div class="password-content">
                <h3>输入密码</h3>
                <div class="morse-hint">
                    <div class="morse-hint-title">朵朵留下的痕迹</div>
                    <div class="morse-rows">
                        <div class="morse-row"><span class="morse-code">.--</span><span class="morse-letter">W</span></div>
                        <div class="morse-row"><span class="morse-code">.-</span><span class="morse-letter">A</span></div>
                        <div class="morse-row"><span class="morse-code">-</span><span class="morse-letter">T</span></div>
                        <div class="morse-row"><span class="morse-code">-.-.</span><span class="morse-letter">C</span></div>
                        <div class="morse-row"><span class="morse-code">....</span><span class="morse-letter">H</span></div>
                    </div>
                </div>
                <input type="text" id="password-input" maxlength="5" placeholder="_____">
                <div class="password-buttons">
                    <button onclick="submitPassword()">确认</button>
                    <button onclick="closePasswordModal()">取消</button>
                </div>
            </div>
        </div>

        <!-- 抽屉密码输入框 -->
        <div id="drawer-modal" class="hidden">
            <div class="password-content">
                <h3>输入抽屉密码</h3>
                <input type="text" id="drawer-input" maxlength="3" placeholder="___">
                <div class="password-buttons">
                    <button onclick="submitDrawerPassword()">确认</button>
                    <button onclick="closeDrawerModal()">取消</button>
                </div>
            </div>
        </div>

        <!-- 结局画面 -->
        <div id="ending-screen" class="hidden">
            <h1 id="ending-title"></h1>
            <p id="ending-text"></p>
            <button class="start-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script src="dist/bundle.js"></script>
</body>
</html>
